version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: staynest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: staynest
      POSTGRES_PASSWORD: staynest_dev_password
      POSTGRES_DB: staynest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U staynest']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: staynest-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staynest-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://staynest:staynest_dev_password@postgres:5432/staynest?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
